<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue — CampusCare</title>
  <link rel="stylesheet" href="landing.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">⚡ CampusCare</div>
    <div class="nav-links" id="navLinks">
      <a href="landing.html">Home</a>
      <a href="announcements.html">Announcements</a>
      <a href="authorities.html">Authorities</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </div>
</nav>

<div class="container" style="margin-top:90px;">
  <header>
    <h1>🔧 Report an Issue</h1>
    <p>Your complaint will be automatically routed to the right department</p>
  </header>

  <form id="complaintForm">
    <div class="form-group">
      <label for="category">Issue Category *</label>
      <select id="category" required>
        <option value="">Select a category</option>
        <option value="plumbing">🚰 Plumbing (Toilet, Sink, etc.)</option>
        <option value="electrical">⚡ Electrical Issues</option>
        <option value="water">💧 Water Supply</option>
        <option value="network">📡 Network / IT Issues</option>
        <option value="maintenance">🔧 General Maintenance</option>
        <option value="other">📋 Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="location">Location *</label>
      <input type="text" id="location" placeholder="e.g., Block A, Room 101" required>
    </div>

    <div class="form-group">
      <label for="description">Describe the Issue *</label>
      <textarea id="description" rows="4" placeholder="Be specific — what's the problem, how long has it been happening?" required></textarea>
    </div>

    <div class="form-group">
      <label for="reporterName">Your Name *</label>
      <input type="text" id="reporterName" placeholder="Your full name" required>
    </div>

    <div class="form-group">
      <label for="reporterContact">Your Contact Number</label>
      <input type="text" id="reporterContact" placeholder="Optional — for follow-up">
    </div>

    <button type="submit" class="btn-submit">Submit Complaint</button>
  </form>

  <div id="message" class="message"></div>
</div>

<script src="app.js"></script>
</body>
</html>
