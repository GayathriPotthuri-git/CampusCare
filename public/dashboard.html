<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Campus Care</title>
    <link rel="stylesheet" href="landing.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">🏛️ Campus Care</div>
            <div class="nav-links">
                <a href="landing.html">Home</a>
                <a href="announcements.html">Announcements</a>
                <a href="authorities.html">Authorities</a>
                <a href="index.html">Report Issue</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px;">
        <header>
            <h1>📊 Complaints Dashboard</h1>
            <p>View and manage all submitted complaints</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3 id="totalCount">0</h3>
                <p>Total Complaints</p>
            </div>
            <div class="stat-card">
                <h3 id="pendingCount">0</h3>
                <p>Pending</p>
            </div>
            <div class="stat-card">
                <h3 id="resolvedCount">0</h3>
                <p>Resolved</p>
            </div>
        </div>

        <div id="complaintsContainer"></div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
