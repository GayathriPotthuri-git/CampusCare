<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — CampusCare</title>
  <link rel="stylesheet" href="landing.css">
  <style>
    body { background: #f8fafc; }
    .ann-wrapper { max-width: 800px; margin: 40px auto; padding: 0 20px 60px; }
    .post-form { background: white; border-radius: 16px; padding: 28px; margin-bottom: 28px; border: 1px solid #e2e8f0; box-shadow: 0 2px 12px rgba(0,0,0,0.05); display: none; }
    .post-form h3 { font-size: 17px; font-weight: 700; color: #0f172a; margin-bottom: 18px; }
    .post-form input, .post-form textarea, .post-form select { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Inter',sans-serif; font-size: 14px; margin-bottom: 12px; outline: none; background: #f8fafc; transition: border-color 0.2s; }
    .post-form input:focus, .post-form textarea:focus, .post-form select:focus { border-color: #0ea5e9; background: white; }
    .post-form textarea { resize: vertical; min-height: 90px; }
    .btn-post { padding: 11px 28px; background: linear-gradient(135deg,#0ea5e9,#10b981); color: white; border: none; border-radius: 10px; font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-post:hover { transform: translateY(-1px); opacity: 0.9; }
    .post-alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
    .post-alert.success { background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;display:block; }
    .post-alert.error   { background:#fef2f2;color:#dc2626;border:1px solid #fecaca;display:block; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn { padding: 7px 18px; border: 2px solid #e2e8f0; border-radius: 20px; background: white; color: #64748b; font-family: 'Inter',sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: linear-gradient(135deg,#0ea5e9,#10b981); color: white; border-color: transparent; }
    .ann-card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; border: 1px solid #e2e8f0; border-left: 4px solid #0ea5e9; box-shadow: 0 2px 12px rgba(0,0,0,0.05); transition: all 0.2s; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .ann-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
    .ann-title { font-size: 17px; font-weight: 700; color: #0f172a; }
    .tag-badge { padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; letter-spacing: 0.3px; }
    .tag-General  { background:#e0f2fe;color:#0369a1; }
    .tag-Hostel   { background:#fef3c7;color:#d97706; }
    .tag-Sports   { background:#dcfce7;color:#16a34a; }
    .tag-Academic { background:#ede9fe;color:#7c3aed; }
    .tag-Club     { background:#fce7f3;color:#be185d; }
    .tag-Event    { background:#ffedd5;color:#c2410c; }
    .ann-body { color: #475569; line-height: 1.7; font-size: 14px; margin-bottom: 12px; }
    .ann-meta { font-size: 12px; color: #94a3b8; display: flex; justify-content: space-between; align-items: center; }
    .btn-delete { padding: 4px 12px; background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter',sans-serif; transition: background 0.2s; }
    .btn-delete:hover { background: #fecaca; }
    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 15px; }
    .border-General  { border-left-color: #0ea5e9; }
    .border-Hostel   { border-left-color: #f59e0b; }
    .border-Sports   { border-left-color: #22c55e; }
    .border-Academic { border-left-color: #8b5cf6; }
    .border-Club     { border-left-color: #ec4899; }
    .border-Event    { border-left-color: #f97316; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">⚡ CampusCare</div>
    <div class="nav-links" id="navLinks">
      <a href="landing.html">Home</a>
      <a href="announcements.html">Announcements</a>
      <a href="authorities.html">Authorities</a>
      <a href="index.html" class="btn-nav">Report Issue</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>📢 Announcements</h1>
  <p>Stay updated with the latest campus news and notices</p>
</div>

<div class="ann-wrapper">
  <div class="post-form" id="postForm">
    <h3>Post New Announcement</h3>
    <div class="post-alert" id="postAlert"></div>
    <input type="text" id="annTitle" placeholder="Announcement title">
    <select id="annTag">
      <option value="General">General</option>
      <option value="Hostel">Hostel</option>
      <option value="Sports">Sports</option>
      <option value="Academic">Academic</option>
      <option value="Club">Club</option>
      <option value="Event">Event</option>
    </select>
    <textarea id="annBody" placeholder="Write your announcement here..."></textarea>
    <button class="btn-post" onclick="postAnnouncement()">Post Announcement</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterBy('All',this)">All</button>
    <button class="filter-btn" onclick="filterBy('General',this)">General</button>
    <button class="filter-btn" onclick="filterBy('Hostel',this)">Hostel</button>
    <button class="filter-btn" onclick="filterBy('Sports',this)">Sports</button>
    <button class="filter-btn" onclick="filterBy('Academic',this)">Academic</button>
    <button class="filter-btn" onclick="filterBy('Club',this)">Club</button>
    <button class="filter-btn" onclick="filterBy('Event',this)">Event</button>
  </div>

  <div id="annList"><p class="empty-state">Loading...</p></div>
</div>

<footer><p>© 2025 CampusCare · MLRIT · Built to make campus life better</p></footer>

<script>
  let allAnn = [], currentFilter = 'All';
  const getToken = () => localStorage.getItem('cc_token');
  const getUser  = () => JSON.parse(localStorage.getItem('cc_user') || 'null');

  function logout() { localStorage.removeItem('cc_token'); localStorage.removeItem('cc_user'); window.location.href = 'login.html'; }

  window.addEventListener('DOMContentLoaded', () => {
    updateNavbar(); loadAnnouncements();
    const user = getUser();
    if (user && user.role === 'admin') document.getElementById('postForm').style.display = 'block';
  });

  function updateNavbar() {
    const user = getUser();
    const nav = document.getElementById('navLinks');
    if (!nav) return;
    if (user) {
      const s = document.createElement('span');
      s.style.cssText = 'color:#0ea5e9;font-weight:600;font-size:13px;';
      s.textContent = `Hi, ${user.name.split(' ')[0]}`;
      const l = document.createElement('a'); l.href='#'; l.textContent='Logout'; l.style.cssText='color:#ef4444;font-weight:600;'; l.onclick=logout;
      nav.appendChild(s); nav.appendChild(l);
    } else {
      const b = document.createElement('a'); b.href='login.html'; b.className='btn-nav'; b.textContent='Login';
      const r = nav.querySelector('.btn-nav'); if (r) r.replaceWith(b);
    }
  }

  async function loadAnnouncements() {
    try {
      const res = await fetch('http://localhost:3000/api/announcements');
      allAnn = await res.json();
      render();
    } catch { document.getElementById('annList').innerHTML = '<p class="empty-state">Could not load. Is the server running?</p>'; }
  }

  function filterBy(tag, btn) {
    currentFilter = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const user = getUser();
    const list = document.getElementById('annList');
    const filtered = currentFilter === 'All' ? allAnn : allAnn.filter(a => a.tag === currentFilter);
    if (!filtered.length) { list.innerHTML = '<p class="empty-state">No announcements in this category yet.</p>'; return; }
    list.innerHTML = filtered.map(a => `
      <div class="ann-card border-${a.tag}">
        <div class="card-top">
          <div class="ann-title">${a.title}</div>
          <span class="tag-badge tag-${a.tag}">${a.tag}</span>
        </div>
        <div class="ann-body">${a.body}</div>
        <div class="ann-meta">
          <span>Posted by ${a.postedBy} · ${new Date(a.timestamp).toLocaleString()}</span>
          ${user&&user.role==='admin'?`<button class="btn-delete" onclick="deleteAnn(${a.id})">Delete</button>`:''}
        </div>
      </div>`).join('');
  }

  async function postAnnouncement() {
    const title = document.getElementById('annTitle').value.trim();
    const body  = document.getElementById('annBody').value.trim();
    const tag   = document.getElementById('annTag').value;
    const alert = document.getElementById('postAlert');
    if (!title||!body) { alert.textContent='Please fill title and body.'; alert.className='post-alert error'; return; }
    try {
      const res = await fetch('http://localhost:3000/api/announcements', { method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()}, body:JSON.stringify({title,body,tag}) });
      const data = await res.json();
      if (data.success) {
        alert.textContent='Posted!'; alert.className='post-alert success';
        document.getElementById('annTitle').value=''; document.getElementById('annBody').value='';
        loadAnnouncements(); setTimeout(()=>{alert.style.display='none';},3000);
      } else { alert.textContent=data.message; alert.className='post-alert error'; }
    } catch { alert.textContent='Server error.'; alert.className='post-alert error'; }
  }

  async function deleteAnn(id) {
    if (!confirm('Delete this announcement?')) return;
    try {
      const res = await fetch(`http://localhost:3000/api/announcements/${id}`, { method:'DELETE', headers:{'Authorization':'Bearer '+getToken()} });
      if (res.ok) loadAnnouncements();
    } catch(e) { console.error(e); }
  }
</script>
<script src="firebase-init.js"></script>
</body>
</html>
